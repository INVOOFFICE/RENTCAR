name: Update Cars Data

on:
  push:
    paths:
      - 'public/data/cars.json'
  workflow_dispatch:

jobs:
  validate:
    name: Validate cars.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate cars.json
        run: |
          echo "Validating cars.json..."
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('public/data/cars.json', 'utf8'));
            if (!Array.isArray(data)) throw new Error('cars.json must be an array');
            data.forEach((c, i) => {
              if (!c.name || !c.image) throw new Error('Car at index ' + i + ' missing name or image');
            });
            console.log('Valid - ' + data.length + ' cars loaded');
          "
